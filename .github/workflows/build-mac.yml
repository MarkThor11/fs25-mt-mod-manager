name: Build Mac Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to upload to (e.g. 1.0.10)'
        required: true
        default: '1.0.10'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Mac App
        env:
          GITHUB_TOKEN: ${{ secrets.UPDATE_TOKEN }}
          GH_TOKEN: ${{ secrets.UPDATE_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          ./node_modules/.bin/electron-builder --mac -c.mac.identity=null -c.dmg.sign=false

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the manually entered tag or the tag that triggered the push
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            release/*.dmg
            release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.UPDATE_TOKEN }}
